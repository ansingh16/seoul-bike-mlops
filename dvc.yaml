stages:
  ingest:
    cmd: python -m seoul_bike_mlops.ingest
    deps:
      - src/seoul_bike_mlops/ingest.py
    params:
      - ingest
    outs:
      - data/raw/SeoulBikeData.csv
      - data/processed/reference.csv
      - data/processed/current.csv

  validate:
    cmd: python -m seoul_bike_mlops.validate
    deps:
      - src/seoul_bike_mlops/validate.py
      - data/processed/reference.csv
      - data/processed/current.csv
    params:
      - validate
    outs:
      - reports/validation.txt
