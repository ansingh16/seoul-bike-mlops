ingest:
  raw_url: "https://archive.ics.uci.edu/static/public/560/seoul+bike+sharing+demand.zip"
  raw_csv: "data/raw/SeoulBikeData.csv"
  split_date: "2018-09-01"
  reference_out: "data/processed/reference.csv"
  current_out: "data/processed/current.csv"

validate:
  inputs:
    - "data/processed/reference.csv"
    - "data/processed/current.csv"
  report_out: "reports/validation.txt"

featurize:
  reference_in: "data/processed/reference.csv"
  current_in: "data/processed/current.csv"
  reference_out: "data/features/reference.csv"
  current_out: "data/features/current.csv"

train:
  features_path: "data/features/reference.csv"
  target: "rented_bike_count"
  holdout_fraction: 0.2
  log_target: true
  model_out: "models/lgbm.txt"
  lgbm:
    n_estimators: 600
    learning_rate: 0.03
    num_leaves: 48
    max_depth: 8
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 0

evaluate:
  metrics_out: "metrics.json"

mlflow:
  tracking_uri: "sqlite:///mlflow.db"
  experiment: "seoul-bike-demand"
  registered_model: "seoul-bike-demand"
